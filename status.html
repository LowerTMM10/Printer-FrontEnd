<!DOCTYPE html>
<html>
<head>
    <title>{{TITLE}}</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding-top: 50px; background: #f4f4f4; }
        .card { background: white; padding: 20px; display: inline-block; border-radius: 10px; shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .error { color: red; }
        .success { color: green; }
        a { text-decoration: none; color: blue; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <h1 class="{{CLASS}}">{{TITLE}}</h1>
        <p>{{MESSAGE}}</p>
        <hr>
        <a href="/">Terug naar Upload</a>
    </div>
</body>
</html>
